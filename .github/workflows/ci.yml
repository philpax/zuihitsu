name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo +nightly fmt --all -- --check
      # The eval crate enables the `console` feature on the main crate (for serve.rs embedding),
      # and Cargo feature unification would turn it on for the whole workspace. Exclude it so the
      # rust job does not need Node, a C++ compiler, or the wasm toolchain.
      - name: Clippy
        run: cargo clippy --no-default-features --workspace --exclude zuihitsu-eval --all-targets -- -D warnings
      - name: Test
        run: cargo test --no-default-features --workspace --exclude zuihitsu-eval

  console:
    name: Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install C++ compiler (for wasm-opt-sys)
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json
      # Install dependencies first so `build.rs`'s conditional `npm install` is a no-op and the
      # subsequent checks run against the same `node_modules` as the embedded build.
      - name: Install
        working-directory: console
        run: npm ci
      # The full build.rs pipeline: ts-rs types, settings metadata, wasm build, wasm-bindgen,
      # wasm-opt, and the npm build — all driven by `cargo build` with the console feature on.
      - name: Build server binary (exercises the full console pipeline)
        env:
          CC_wasm32_unknown_unknown: clang
        run: cargo build -p zuihitsu
      - name: Build eval binary (exercises the eval crate's console embedding)
        env:
          CC_wasm32_unknown_unknown: clang
        run: cargo build -p zuihitsu-eval
      - name: Typecheck
        working-directory: console
        run: npm run typecheck
      - name: Lint
        working-directory: console
        run: npm run lint
      - name: Test
        working-directory: console
        run: npm run test
      - name: Format
        working-directory: console
        run: npm run format:check
      - name: Build
        working-directory: console
        run: npm run build
