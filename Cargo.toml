[package]
name = "zuihitsu"
version = "0.1.0"
edition = "2024"

[lib]
name = "zuihitsu"
path = "src/lib.rs"

[[bin]]
name = "zuihitsu"
path = "src/main.rs"

[dependencies]
async-trait = "0.1.89"
clap = { version = "4.6.1", features = ["derive"] }
fs2 = { version = "0.4.3", optional = true }
rusqlite = { version = "0.40.0", features = ["bundled"], optional = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
smol_str = { version = "0.3.6", features = ["serde"] }
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
ulid = { version = "1.2.1", features = ["serde"] }

[features]
default = ["sqlite"]
# The SQLite-backed event store. With this off, only the in-memory store and fakes are built,
# which is the pure no-I/O configuration the tests exercise via --no-default-features.
sqlite = ["dep:rusqlite", "dep:fs2"]

[dev-dependencies]
tokio = { version = "1.52.3", features = ["rt", "macros"] }
