[package]
name = "zuihitsu"
version = "0.1.0"
edition = "2024"

[lib]
name = "zuihitsu"
path = "src/lib.rs"

[[bin]]
name = "zuihitsu"
path = "src/main.rs"

[dependencies]
async-openai = { version = "0.40.2", default-features = false, features = [
    "byot",
    "rustls",
    "chat-completion",
    "embedding",
], optional = true }
async-trait = "0.1.89"
clap = { version = "4.6.1", features = ["derive"] }
fs2 = { version = "0.4.3", optional = true }
mlua = { version = "0.11.6", features = ["lua54", "vendored"], optional = true }
rusqlite = { version = "0.40.0", features = ["bundled"], optional = true }
schemars = { version = "1.2.1", optional = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.11.0"
smol_str = { version = "0.3.6", features = ["serde"] }
sqlite-vec = { version = "=0.1.6", optional = true }
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
ulid = { version = "1.2.1", features = ["serde"] }

[features]
default = ["lua", "openai"]
# The SQLite-backed event store and materialized graph. With this off, only the in-memory store
# and seam fakes are built — the pure no-I/O configuration the tests exercise via
# --no-default-features.
sqlite = ["dep:rusqlite", "dep:sqlite-vec", "dep:fs2"]
# The Lua VM and agent execution layer. Implies `sqlite`, since a block commits to the graph.
lua = ["dep:mlua", "sqlite"]
# The real model client and embedder over an OpenAI-compatible HTTP endpoint.
openai = ["dep:async-openai", "dep:schemars"]

[dev-dependencies]
tokio = { version = "1.52.3", features = ["rt", "macros"] }
